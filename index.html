<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinanceDesk</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME VARIABLES ── */
:root {
  --bg:#070b10; --bg-p:#0b1219; --bg-c:#101a24; --bg-h:#14202e; --bg-a:#162840;
  --bd:#1c2e40; --bd-h:#273f58;
  --tx:#b0c8e0; --tx-d:#4d6d8a; --tx-m:#243448;
  --ac:#2a8ef0; --ac-d:rgba(42,142,240,.12); --ac-b:rgba(42,142,240,.25);
  --gr:#00c87a; --gr-d:rgba(0,200,122,.10); --gr-b:rgba(0,200,122,.22);
  --rd:#ff3550; --rd-d:rgba(255,53,80,.10); --rd-b:rgba(255,53,80,.22);
  --yl:#f0c030; --yl-d:rgba(240,192,48,.10);
  --mono:'IBM Plex Mono',monospace;
  --disp:'IBM Plex Sans Condensed',sans-serif;
  --r:3px;
}
[data-theme="light"] {
  --bg:#edf1f7; --bg-p:#ffffff; --bg-c:#f3f6fb; --bg-h:#e8edf5; --bg-a:#dce8f8;
  --bd:#d0dce8; --bd-h:#b0c4d8;
  --tx:#1a2d42; --tx-d:#4a6a88; --tx-m:#8aa0b8;
  --ac:#1464c4; --ac-d:rgba(20,100,196,.09); --ac-b:rgba(20,100,196,.20);
  --gr:#006e44; --gr-d:rgba(0,110,68,.08); --gr-b:rgba(0,110,68,.18);
  --rd:#c0182c; --rd-d:rgba(192,24,44,.08); --rd-b:rgba(192,24,44,.18);
  --yl:#a07800; --yl-d:rgba(160,120,0,.08);
}

/* ── BASE ── */
html,body { height:100%; font-family:var(--mono); font-size:12px; background:var(--bg); color:var(--tx); overflow:hidden; transition:background .25s,color .25s }
::-webkit-scrollbar { width:3px; height:3px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--bd-h); border-radius:2px }
button { font-family:inherit; }

/* ── APP SHELL ── */
.app { display:flex; flex-direction:column; height:100vh }

/* ── HEADER ── */
.hdr {
  flex-shrink:0; height:44px; display:flex; align-items:center;
  padding:0 16px; gap:12px; background:var(--bg-p); border-bottom:1px solid var(--bd);
}
.logo { display:flex; align-items:center; gap:9px; text-decoration:none }
.logo-box {
  font-family:var(--disp); font-size:17px; font-weight:900; color:var(--ac);
  border:2px solid var(--ac); padding:1px 7px 0; border-radius:var(--r);
  line-height:1.35; letter-spacing:-.01em; user-select:none;
}
.logo-tx { font-family:var(--disp); font-size:16px; font-weight:700; color:var(--tx); letter-spacing:.07em }
.hdr-mid { display:flex; align-items:center; gap:8px; margin-left:4px }
.mkt-pill {
  display:flex; align-items:center; gap:5px; font-family:var(--disp); font-size:9px;
  font-weight:800; letter-spacing:.12em; padding:3px 8px; border-radius:var(--r); user-select:none;
}
.mkt-pill.open   { color:var(--gr); background:var(--gr-d); border:1px solid var(--gr-b) }
.mkt-pill.closed { color:var(--rd); background:var(--rd-d); border:1px solid var(--rd-b) }
.mkt-pill.always { color:var(--ac); background:var(--ac-d); border:1px solid var(--ac-b) }
.pill-dot { width:5px; height:5px; border-radius:50%; background:currentColor; animation:blink 2s infinite }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.hdr-sp { flex:1 }
.hdr-r  { display:flex; align-items:center; gap:7px }
.cd-wrap { font-family:var(--disp); font-size:10px; font-weight:600; color:var(--tx-d); letter-spacing:.06em; white-space:nowrap }
.cd-val  { color:var(--tx); font-weight:800 }
.hdr-btn {
  font-family:var(--disp); font-size:10px; font-weight:700; letter-spacing:.1em;
  padding:4px 11px; border-radius:var(--r); border:1px solid var(--bd-h);
  background:none; cursor:pointer; color:var(--tx-d); transition:all .15s;
}
.hdr-btn:hover { color:var(--ac); border-color:var(--ac) }
.theme-btn { padding:4px 9px; font-size:13px; letter-spacing:0 }

/* ── SECTOR TABS ── */
.sec-nav {
  flex-shrink:0; height:36px; display:flex; align-items:center;
  background:var(--bg-p); border-bottom:1px solid var(--bd); padding:0 16px; gap:0;
}
.sec-tab {
  font-family:var(--disp); font-size:11px; font-weight:800; letter-spacing:.16em;
  padding:0 15px; height:100%; display:flex; align-items:center; gap:6px;
  cursor:pointer; color:var(--tx-m); border-bottom:2px solid transparent;
  transition:all .15s; user-select:none;
}
.sec-tab:hover { color:var(--tx-d) }
.sec-tab.active { color:var(--ac); border-bottom-color:var(--ac) }
.sec-cnt {
  font-size:9px; padding:1px 5px; border-radius:8px;
  background:var(--bg-c); color:var(--tx-m);
}
.sec-tab.active .sec-cnt { background:var(--ac-d); color:var(--ac) }
.nav-sp { flex:1 }
.grp-tog { display:flex; gap:3px; background:var(--bg-c); border:1px solid var(--bd); border-radius:var(--r); padding:2px }
.grp-b {
  font-family:var(--disp); font-size:9px; font-weight:800; letter-spacing:.12em;
  padding:2px 9px; border-radius:2px; cursor:pointer; background:none;
  border:none; color:var(--tx-m); transition:all .15s;
}
.grp-b:hover { color:var(--tx-d) }
.grp-b.active { background:var(--ac); color:#fff }

/* ── MAIN BODY ── */
.main-b { display:flex; flex:1; overflow:hidden }

/* ── WATCHLIST PANEL ── */
.wl-panel {
  width:258px; flex-shrink:0; display:flex; flex-direction:column;
  background:var(--bg-p); border-right:1px solid var(--bd); overflow:hidden;
}
.wl-top { padding:9px 11px; border-bottom:1px solid var(--bd); display:flex; flex-direction:column; gap:6px }
.wl-add { display:flex; gap:5px }
.wl-input {
  flex:1; background:var(--bg-c); border:1px solid var(--bd); color:var(--tx);
  padding:5px 8px; font-family:var(--mono); font-size:11px; border-radius:var(--r);
  outline:none; text-transform:uppercase; transition:border-color .15s;
}
.wl-input::placeholder { color:var(--tx-m); text-transform:none; font-size:10px }
.wl-input:focus { border-color:var(--ac) }
.wl-add-btn {
  width:28px; background:var(--ac-d); border:1px solid var(--ac); color:var(--ac);
  border-radius:var(--r); cursor:pointer; font-size:19px; font-weight:700;
  display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0;
}
.wl-add-btn:hover { background:var(--ac); color:#fff }
.wl-hint { font-family:var(--disp); font-size:9px; color:var(--tx-m); letter-spacing:.04em }
.wl-scroll { flex:1; overflow-y:auto; padding:2px 0 }

/* ── WATCHLIST GROUP ── */
.wl-group {}
.grp-header {
  display:flex; align-items:center; padding:5px 11px 5px 8px; cursor:pointer;
  user-select:none; transition:background .12s; gap:5px; border-bottom:1px solid var(--bd);
  position:sticky; top:0; z-index:2; background:var(--bg-p);
}
.grp-header:hover { background:var(--bg-h) }
.grp-arrow { font-size:8px; color:var(--tx-m); transition:transform .2s; flex-shrink:0; line-height:1 }
.grp-header.open .grp-arrow { transform:rotate(90deg) }
.grp-name {
  font-family:var(--disp); font-size:9px; font-weight:800; letter-spacing:.16em;
  color:var(--tx-d); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.grp-meta { display:flex; align-items:center; gap:6px; flex-shrink:0 }
.grp-count { font-family:var(--disp); font-size:9px; color:var(--tx-m) }
.grp-avg   { font-family:var(--disp); font-size:9px; font-weight:800 }
.grp-body  { overflow:hidden; max-height:0; transition:max-height .22s ease }
.grp-body.open { max-height:3000px }

/* ── TICKER ITEM ── */
.t-item {
  display:flex; align-items:center; padding:5px 10px 5px 6px;
  cursor:pointer; border-left:2px solid transparent;
  transition:background .1s; animation:slideIn .18s ease; user-select:none;
}
@keyframes slideIn { from{opacity:0;transform:translateX(-5px)} to{opacity:1;transform:translateX(0)} }
.t-item:hover { background:var(--bg-h) }
.t-item.selected { background:var(--bg-a); border-left-color:var(--ac) }
.t-item.drag-over-top    { border-top:2px solid var(--ac) }
.t-item.drag-over-bottom { border-bottom:2px solid var(--ac) }
.t-drag {
  font-size:12px; color:var(--tx-m); cursor:grab; opacity:0;
  transition:opacity .1s; flex-shrink:0; line-height:1; padding:0 3px 0 1px;
}
.t-item:hover .t-drag { opacity:1 }
.t-drag:active { cursor:grabbing }
.t-sym  { font-size:11px; font-weight:600; color:var(--tx); letter-spacing:.03em; min-width:46px; flex-shrink:0 }
.t-name {
  font-family:var(--disp); font-size:9px; color:var(--tx-m);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; margin:0 4px;
}
.t-right { display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; gap:1px }
.t-price { font-size:10px; font-weight:500; color:var(--tx) }
.t-pct   { font-size:9px; font-weight:700 }
.t-ld    { font-size:9px; color:var(--tx-m) }
.t-rm {
  opacity:0; background:none; border:none; color:var(--tx-m);
  cursor:pointer; padding:2px 3px; font-size:14px; margin-left:3px;
  transition:all .12s; flex-shrink:0; line-height:1;
}
.t-item:hover .t-rm { opacity:1 }
.t-rm:hover { color:var(--rd) }

/* ── RIGHT PANEL ── */
.rt-panel { flex:1; display:flex; flex-direction:column; overflow:hidden }

/* ── HEATMAP STRIP ── */
.hm-strip {
  flex-shrink:0; padding:8px 14px 9px;
  background:var(--bg-p); border-bottom:1px solid var(--bd);
}
.hm-label {
  font-family:var(--disp); font-size:8px; font-weight:800;
  letter-spacing:.2em; color:var(--tx-m); margin-bottom:6px;
}
.hm-row { display:flex; gap:4px; overflow-x:auto; padding-bottom:1px }
.hm-row::-webkit-scrollbar { height:2px }
.hm-tile {
  flex-shrink:0; min-width:68px; padding:5px 8px; border-radius:var(--r);
  cursor:pointer; border:1px solid transparent; transition:filter .15s,border-color .15s,transform .1s;
  display:flex; flex-direction:column; align-items:center; gap:1px;
}
.hm-tile:hover { filter:brightness(1.15); transform:translateY(-1px); border-color:rgba(255,255,255,.15) }
.hm-tile-name { font-family:var(--disp); font-size:8px; font-weight:700; letter-spacing:.07em; color:var(--tx); opacity:.85; white-space:nowrap }
.hm-tile-pct  { font-family:var(--disp); font-size:12px; font-weight:900; color:#fff }

/* ── PREVIEW AREA ── */
.pv-area { flex:1; overflow-y:auto; background:var(--bg) }
.pv-empty, .pv-load {
  height:100%; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px;
}
.pv-icon  { font-size:40px; color:var(--tx-m); opacity:.2; line-height:1 }
.pv-title { font-family:var(--disp); font-size:12px; font-weight:800; letter-spacing:.18em; color:var(--tx-m) }
.pv-sub   { font-family:var(--disp); font-size:9px; color:var(--tx-m); letter-spacing:.1em }
.spinner  { width:20px; height:20px; border:2px solid var(--bd-h); border-top-color:var(--ac); border-radius:50%; animation:spin .7s linear infinite }
@keyframes spin { to{transform:rotate(360deg)} }
.spin-lbl { font-family:var(--disp); font-size:10px; font-weight:700; letter-spacing:.15em; color:var(--tx-m) }

/* ── PREVIEW CONTENT ── */
.pv-body { padding:20px 24px; animation:fadeUp .22s ease }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

.pv-top  { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:15px; gap:12px }
.pv-left {}
.pv-sym  { font-family:var(--disp); font-size:38px; font-weight:900; color:var(--tx); line-height:1; letter-spacing:.01em }
.pv-name { font-family:var(--disp); font-size:13px; color:var(--tx-d); margin-top:3px }
.pv-exch { font-family:var(--disp); font-size:9px; color:var(--tx-m); letter-spacing:.08em; margin-top:2px }
.pv-right { text-align:right; flex-shrink:0 }
.pv-price { font-size:30px; font-weight:600; color:var(--tx); letter-spacing:-.02em; line-height:1 }
.pv-chg-row { display:flex; gap:7px; justify-content:flex-end; margin-top:5px; align-items:center }
.pv-abs { font-size:13px; font-weight:500 }
.pv-pct { font-size:13px; font-weight:800; padding:2px 8px; border-radius:var(--r) }
.pv-pct.pos { background:var(--gr-d) }
.pv-pct.neg { background:var(--rd-d) }
.pv-prev { font-family:var(--disp); font-size:9px; color:var(--tx-m); letter-spacing:.06em; margin-top:4px }

.divider { height:1px; background:var(--bd); margin:12px 0 }
.sec-lbl { font-family:var(--disp); font-size:8px; font-weight:800; letter-spacing:.2em; color:var(--tx-m); margin-bottom:8px }

/* ── TIMEFRAME GRID ── */
.tf-grid { display:flex; gap:7px; margin-bottom:14px }
.tf-card {
  flex:1; background:var(--bg-c); border:1px solid var(--bd);
  border-radius:var(--r); padding:8px 10px; text-align:center;
}
.tf-period { font-family:var(--disp); font-size:8px; font-weight:800; letter-spacing:.14em; color:var(--tx-m); margin-bottom:4px }
.tf-val    { font-size:11px; font-weight:700 }
.tf-val.ld { color:var(--tx-m) }

/* ── TV INTERVAL BUTTONS ── */
.tv-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px }
.tv-bar-left  { display:flex; align-items:center; gap:6px }
.tv-bar-right { display:flex; align-items:center; gap:4px }
.iv-wrap { display:flex; gap:3px }
.iv-btn {
  font-family:var(--disp); font-size:9px; font-weight:700; letter-spacing:.1em;
  padding:2px 8px; border-radius:var(--r); border:1px solid var(--bd);
  background:none; cursor:pointer; color:var(--tx-m); transition:all .12s;
}
.iv-btn:hover { color:var(--tx) }
.iv-btn.active { background:var(--ac); color:#fff; border-color:var(--ac) }
.tv-acct-note {
  font-family:var(--disp); font-size:9px; color:var(--tx-m); letter-spacing:.04em;
  display:flex; align-items:center; gap:4px;
}
.tv-acct-dot { width:6px; height:6px; border-radius:50%; background:var(--gr); flex-shrink:0 }
.fs-btn {
  font-family:var(--disp); font-size:9px; font-weight:700; letter-spacing:.1em;
  padding:2px 9px; border-radius:var(--r); border:1px solid var(--bd-h);
  background:var(--bg-c); cursor:pointer; color:var(--tx-d); transition:all .12s;
  display:flex; align-items:center; gap:5px;
}
.fs-btn:hover { color:var(--ac); border-color:var(--ac) }
/* frame wrapper — resizable */
.tv-frame-wrap {
  border-radius:var(--r); overflow:hidden; border:1px solid var(--bd);
  position:relative; margin-bottom:14px;
}
#tvFrame { width:100%; height:500px; display:block; border:none; background:var(--bg-c) }
/* Fullscreen overlay */
.tv-fullscreen {
  position:fixed; inset:0; z-index:10000;
  background:var(--bg); display:flex; flex-direction:column;
  animation:fsIn .18s ease;
}
@keyframes fsIn { from{opacity:0;transform:scale(.98)} to{opacity:1;transform:scale(1)} }
.tv-fs-bar {
  flex-shrink:0; height:40px; background:var(--bg-p); border-bottom:1px solid var(--bd);
  display:flex; align-items:center; padding:0 14px; gap:10px;
}
.tv-fs-sym { font-family:var(--disp); font-size:15px; font-weight:800; color:var(--tx); letter-spacing:.06em }
.tv-fs-ivs { display:flex; gap:3px }
.tv-fs-close {
  margin-left:auto; font-family:var(--disp); font-size:10px; font-weight:700;
  letter-spacing:.1em; padding:3px 12px; border-radius:var(--r);
  border:1px solid var(--rd-b); background:var(--rd-d); color:var(--rd);
  cursor:pointer; transition:all .12s;
}
.tv-fs-close:hover { background:var(--rd); color:#fff }
#tvFrameFull { width:100%; flex:1; border:none; display:block; background:var(--bg-c) }

/* ── METRICS ── */
.mt-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:14px }
.mc {
  background:var(--bg-c); border:1px solid var(--bd);
  border-radius:var(--r); padding:11px 13px;
}
.mc-l { font-family:var(--disp); font-size:8px; font-weight:800; letter-spacing:.18em; color:var(--tx-m); margin-bottom:5px }
.mc-v { font-size:15px; font-weight:600; color:var(--tx); line-height:1 }
.mc-s { font-family:var(--disp); font-size:9px; color:var(--tx-m); margin-top:4px }

/* ── 52W RANGE ── */
.rng-sec  { margin-bottom:14px }
.rng-row  { display:flex; align-items:center; gap:12px }
.rng-end  { min-width:60px }
.rng-end.hi { text-align:right }
.rng-ev   { font-size:11px; font-weight:600; color:var(--tx) }
.rng-el   { font-family:var(--disp); font-size:8px; color:var(--tx-m); letter-spacing:.08em; margin-top:1px }
.rng-track {
  flex:1; height:6px; border-radius:3px; position:relative;
  background:linear-gradient(90deg,var(--rd),#777 50%,var(--gr));
  border:1px solid var(--bd-h);
}
.rng-knob {
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:12px; height:12px; border-radius:50%;
  background:var(--bg-p); border:2px solid var(--ac);
  box-shadow:0 0 0 2px var(--bg),0 2px 6px rgba(0,0,0,.35);
}
.rng-pct-txt { font-family:var(--disp); font-size:9px; color:var(--ac); font-weight:700; text-align:center; margin-top:6px; letter-spacing:.05em }

/* ── TV DEEP LINK ── */
.tv-link {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:12px; border-radius:var(--r); text-decoration:none;
  background:var(--ac-d); border:1px solid var(--ac-b); color:var(--ac);
  font-family:var(--disp); font-size:13px; font-weight:800; letter-spacing:.1em;
  transition:all .15s; margin-bottom:14px;
}
.tv-link:hover { background:var(--ac); color:#fff }
.tv-link svg   { width:16px; height:16px; flex-shrink:0 }
.tv-note { font-family:var(--disp); font-size:9px; color:var(--tx-m); text-align:center; margin-bottom:20px; letter-spacing:.05em }

/* ── STATUS BAR ── */
.sbar {
  flex-shrink:0; height:24px; display:flex; align-items:center;
  padding:0 14px; background:var(--bg-p); border-top:1px solid var(--bd);
}
.sb-item {
  font-family:var(--disp); font-size:9px; font-weight:600; color:var(--tx-m);
  letter-spacing:.08em; padding:0 12px; display:flex; align-items:center; gap:4px;
  border-right:1px solid var(--bd);
}
.sb-item:first-child { padding-left:0 }
.sb-hi  { color:var(--tx-d) }
.sb-last{ margin-left:auto; border-right:none; padding-right:0 }

/* ── COLOR HELPERS ── */
.pos { color:var(--gr) }
.neg { color:var(--rd) }
.flat{ color:var(--tx-d) }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:32px; left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--bg-c); border:1px solid var(--bd-h); color:var(--tx);
  padding:7px 16px; border-radius:var(--r);
  font-family:var(--disp); font-size:11px; font-weight:700; letter-spacing:.05em;
  opacity:0; transition:all .22s; z-index:9999; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0) }
.toast.ok  { border-color:var(--gr); color:var(--gr) }
.toast.err { border-color:var(--rd); color:var(--rd) }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="logo">
      <div class="logo-box">FD</div>
      <div class="logo-tx">FinanceDesk</div>
    </div>
    <div class="hdr-mid">
      <div id="mktPill" class="mkt-pill closed">
        <div class="pill-dot"></div><span id="mktLbl">CLOSED</span>
      </div>
    </div>
    <div class="hdr-sp"></div>
    <div class="hdr-r">
      <div class="cd-wrap">AUTO ⟳ <span class="cd-val" id="cdVal">5:00</span></div>
      <button class="hdr-btn" onclick="manualRefresh()">⟳ REFRESH</button>
      <button class="hdr-btn theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☀</button>
    </div>
  </header>

  <!-- SECTOR NAV -->
  <nav class="sec-nav" id="secNav">

const cc  = v => v > 0.01 ? 'pos' : v < -0.01 ? 'neg' : 'flat';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function fp(v, cur) {
  if (v == null || isNaN(v)) return '—';
  const a = Math.abs(v);
  const dec = a >= 1000 ? 2 : a >= 100 ? 2 : a >= 10 ? 3 : a >= 1 ? 4 : a >= 0.001 ? 5 : 6;
  return v.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:dec });
}
function fv(v) {
  if (!v && v !== 0) return '—';
  if (v >= 1e12) return (v/1e12).toFixed(2)+'T';
  if (v >= 1e9)  return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6)  return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3)  return (v/1e3).toFixed(1)+'K';
  return v.toLocaleString();
}
function fPct(v) { return v==null ? '—' : (v>=0?'+':'')+v.toFixed(2)+'%' }
function fAbs(v,cur){ return v==null ? '—' : (v>=0?'+':'')+cs(cur)+fp(Math.abs(v),cur) }

// ═══════════════════════════════════════════════════════════

async function yfFetch(sym, range, interval) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=${range}&interval=${interval}&includePrePost=false`;
  for (const px of PROXIES) {
    try {
      const r = await fetch(px + encodeURIComponent(url), { signal: AbortSignal.timeout(9000) });
      if (!r.ok) continue;
      const txt = await r.text();
      if (!txt.startsWith('{')) continue;
      const j = JSON.parse(txt);
      return j?.chart?.result?.[0] || null;
    } catch { continue; }
  }
  return null;
}

async function fetchOne(sym) {
  const res = await yfFetch(sym, '5d', '1d');
  if (!res) return null;
  const m = res.meta;
  const price = m.regularMarketPrice;
  if (!price) return null;
  const prev = m.chartPreviousClose ?? m.regularMarketPreviousClose ?? price;
  return {
    price, prev,
    change:    price - prev,
    changePct: ((price - prev) / prev) * 100,
    volume:    m.regularMarketVolume,
    high52:    m.fiftyTwoWeekHigh,
    low52:     m.fiftyTwoWeekLow,
    name:      (m.shortName || m.longName || sym).replace(/&amp;/g,'&'),
    currency:  m.currency || 'USD',
    exchange:  m.exchangeName || '',
    ts:        Date.now(),
  };
}

async function fetchTimeframes(sym) {
  const d = S.data[sym]; if (!d) return {};
  const cur = d.price;
  const [r2d, r3m] = await Promise.allSettled([
    yfFetch(sym,'2d','60m'),
    yfFetch(sym,'3mo','1d'),
  ]);
  const r = {};
  if (r2d.status==='fulfilled' && r2d.value) {
    const closes = (r2d.value.indicators?.quote?.[0]?.close||[]).filter(x=>x!=null);
    const n = closes.length;
    if (n >= 2) r.H1 = ((cur - closes[n-2]) / closes[n-2]) * 100;
    if (n >= 5) r.H4 = ((cur - closes[n-5]) / closes[n-5]) * 100;
  }
  if (r3m.status==='fulfilled' && r3m.value) {
    const closes = (r3m.value.indicators?.quote?.[0]?.close||[]).filter(x=>x!=null);
    const n = closes.length;
    if (n >= 2)  r.D1 = ((cur - closes[n-2]) / closes[n-2]) * 100;
    if (n >= 6)  r.W1 = ((cur - closes[n-6]) / closes[n-6]) * 100;
    if (n >= 22) r.M1 = ((cur - closes[n-23]) / closes[n-23]) * 100;
  }
  return r;
}

async function fetchAllSector() {
  const groups = getGroups(S.sector);
  const allSyms = [...new Set(Object.values(groups).flat())];
  const sel = S.selected[S.sector];
  // Prioritise selected symbol
  const ordered = sel ? [sel, ...allSyms.filter(s=>s!==sel)] : allSyms;
  const BATCH = 6;
  for (let i = 0; i < ordered.length; i += BATCH) {
    await Promise.all(ordered.slice(i, i+BATCH).map(async sym => {
      if (S.fetching.has(sym)) return;
      S.fetching.add(sym);
      const d = await fetchOne(sym);
      S.fetching.delete(sym);
      if (d) S.data[sym] = d;
      updateTickerEl(sym);
      if (sym === S.selected[S.sector]) refreshPreviewPrices(sym);
    }));
    renderHeatmap();
    if (i + BATCH < ordered.length) await sleep(300);
  }
  const now = new Date();
  document.getElementById('lastUp').textContent =
    [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
}

function startCycle() {
  if (S.cdTimer) clearInterval(S.cdTimer);
  S.cd = 300;
  fetchAllSector();
  S.cdTimer = setInterval(() => {
    S.cd--;
    if (S.cd <= 0) { S.cd = 300; fetchAllSector(); }
    document.getElementById('cdVal').textContent =
      Math.floor(S.cd/60)+':'+String(S.cd%60).padStart(2,'0');
  }, 1000);
}

function updateMarket() {
  const pill = document.getElementById('mktPill');
  const lbl  = document.getElementById('mktLbl');
  if (S.sector === 'crypto') {
    pill.className = 'mkt-pill always'; lbl.textContent = '24/7 OPEN'; return;
  }
  const now = new Date();
  const d   = now.getUTCDay();
  const h   = now.getUTCHours();
  const m   = now.getUTCMinutes();
  if (S.sector === 'forex') {
    const open = d >= 1 && d <= 5;
    pill.className = 'mkt-pill ' + (open ? 'open' : 'closed');
    lbl.textContent = open ? 'FX OPEN' : 'FX CLOSED'; return;
  }
  // NYSE: 09:30–16:00 ET = 13:30–20:00 UTC (approx, ignores DST)
  const utcMin = h * 60 + m;
  const open   = d >= 1 && d <= 5 && utcMin >= 810 && utcMin < 1200;
  pill.className  = 'mkt-pill ' + (open ? 'open' : 'closed');
  lbl.textContent = open ? 'NYSE OPEN' : 'CLOSED';
}

// ═══════════════════════════════════════════════════════════
// GROUPS & UNIVERSE
// ═══════════════════════════════════════════════════════════
function getGroups(sec) {
  sec = sec || S.sector;
  const mode = S.subGrp[sec];
  const base = UNI[sec]?.[mode] || {};
  const rm   = new Set(S.removed[sec] || []);
  const cust = (S.custom[sec] || []).filter(s => !rm.has(s));
  const res  = {};

  if (cust.length) {
    const key = `${sec}|custom`;
    res['★ Custom'] = applyOrder(key, cust);
  }
  for (const [name, tickers] of Object.entries(base)) {
    const key  = `${sec}|${mode}|${name}`;
    const list = applyOrder(key, tickers.filter(s => !rm.has(s)));
    if (list.length) res[name] = list;
  }
  return res;
}

function applyOrder(key, list) {
  const ord = S.order[key];
  if (!ord) return list;
  const present  = ord.filter(s => list.includes(s));
  const extra    = list.filter(s => !ord.includes(s));
  return [...present, ...extra];
}

function saveOrder(key, list) {
  S.order[key] = list;
  sv('fd2_ord', S.order);
}

function getAllForSector(sec) {
  const grps = getGroups(sec);
  return [...new Set(Object.values(grps).flat())];
}

function countAll() {
  for (const s of ['stocks','crypto','forex']) {
    document.getElementById('cnt-'+s).textContent = getAllForSector(s).length;
  }
}

  else if (sel) { pvLoad(sel); loadAndRenderPreview(sel); }
  else pvEmpty();
  startCycle();
}

function setSubGrp(mode) {

  document.querySelectorAll('.grp-b').forEach(b => b.classList.toggle('active', b.dataset.m===mode));

  ).join('');
}

// ═══════════════════════════════════════════════════════════
// ADD / REMOVE TICKER
// ═══════════════════════════════════════════════════════════
function normSym(raw, sec) {
  let s = raw.trim().toUpperCase().replace(/\s+/g,'');
  if (!s) return null;
  if (sec==='crypto' && !s.includes('-')) s += '-USD';
  if (sec==='forex'  && !s.endsWith('=X') && !s.includes('=')) s += '=X';
  return s;
}

async function addTicker() {
  const input = document.getElementById('symIn');
  const sym   = normSym(input.value, S.sector);
  if (!sym) return;

  // Check if already in universe
  const existing = getAllForSector(S.sector);
  if (existing.includes(sym)) {
    toast(sym+' already in watchlist', 'err');
    input.value = ''; return;
  }

  input.value = '';
  S.custom[S.sector].push(sym);
  sv('fd2_cust', S.custom);
  renderWL(); countAll();
  pvLoad(sym);

  S.fetching.add(sym);
  const d = await fetchOne(sym);
  S.fetching.delete(sym);

  if (!d) {
    toast('Symbol not found: '+sym, 'err');
    S.custom[S.sector] = S.custom[S.sector].filter(s=>s!==sym);
    sv('fd2_cust', S.custom);
    renderWL(); countAll();
    pvEmpty(); return;
  }
  S.data[sym] = d;
  renderWL(); updateTickerEl(sym);
  toast(sym+' added ✓', 'ok');
  selectTicker(sym);
}

function removeTicker(sym, e) {
  e.stopPropagation();
  S.removed[S.sector] = [...(S.removed[S.sector]||[]), sym];
  S.custom[S.sector]  = (S.custom[S.sector]||[]).filter(s=>s!==sym);
  sv('fd2_rm',   S.removed);
  sv('fd2_cust', S.custom);
  if (S.selected[S.sector] === sym) {
    const all  = getAllForSector(S.sector).filter(s=>s!==sym);
    S.selected[S.sector] = all[0] || null;
    sv('fd2_sel', S.selected);
  }
  renderWL(); countAll();
  const ns = S.selected[S.sector];
  if (ns && S.data[ns]) renderPreview(ns);
  else pvEmpty();
  toast(sym+' removed');
}

function selectTicker(sym) {
  S.selected[S.sector] = sym; sv('fd2_sel', S.selected);
  document.querySelectorAll('.t-item').forEach(el => el.classList.toggle('selected', el.dataset.sym===sym));
  if (S.data[sym]) renderPreview(sym);
  else { pvLoad(sym); loadAndRenderPreview(sym); }
}

async function loadAndRenderPreview(sym) {
  S.fetching.add(sym);
  const d = await fetchOne(sym);
  S.fetching.delete(sym);
  if (d) { S.data[sym] = d; updateTickerEl(sym); }
  if (S.selected[S.sector] === sym) {
    if (d) renderPreview(sym);
    else pvEmpty();
  }
}

// ═══════════════════════════════════════════════════════════
// DRAG TO REORDER
// ═══════════════════════════════════════════════════════════
function onDragStart(e, sym, grpKey) {
  S.dragSrc = sym; S.dragGrp = grpKey;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', sym);
}
function onDragOver(e, sym) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.t-item').forEach(el => {
    el.classList.remove('drag-over-top','drag-over-bottom');
  });
  const el = document.querySelector(`.t-item[data-sym="${sym}"]`);
  if (el && sym !== S.dragSrc) {
    const rect = el.getBoundingClientRect();
    el.classList.add(e.clientY < rect.top + rect.height/2 ? 'drag-over-top' : 'drag-over-bottom');
  }
}
function onDrop(e, sym, grpKey) {
  e.preventDefault();
  document.querySelectorAll('.t-item').forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));
  if (!S.dragSrc || S.dragSrc === sym || S.dragGrp !== grpKey) return;

  const groups = getGroups(S.sector);
  const grpName = Object.keys(groups).find(k => {
    const key = k==='★ Custom' ? `${S.sector}|custom` : `${S.sector}|${S.subGrp[S.sector]}|${k}`;
    return key === grpKey;
  });
  if (!grpName) return;
  const key  = grpKey;
  const list = [...groups[grpName]];
  const fi   = list.indexOf(S.dragSrc);
  const ti   = list.indexOf(sym);
  if (fi < 0 || ti < 0) return;
  const [item] = list.splice(fi, 1);
  const el     = document.querySelector(`.t-item[data-sym="${sym}"]`);
  const rect   = el ? el.getBoundingClientRect() : null;
  const before = rect && e.clientY < rect.top + rect.height/2;
  list.splice(before ? ti : ti, 0, item);
  saveOrder(key, list);
  renderWL();
}
function onDragEnd() {
  document.querySelectorAll('.t-item').forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));
  S.dragSrc = null; S.dragGrp = null;
}

// ═══════════════════════════════════════════════════════════
// WATCHLIST RENDER
// ═══════════════════════════════════════════════════════════
function renderWL() {
  const groups  = getGroups(S.sector);
  const sel     = S.selected[S.sector];
  const scroll  = document.getElementById('wlScroll');
  let html      = '';

  for (const [gName, syms] of Object.entries(groups)) {
    const grpKey = gName==='★ Custom'
      ? `${S.sector}|custom`
      : `${S.sector}|${S.subGrp[S.sector]}|${gName}`;
    const colKey  = `col|${grpKey}`;
    const isOpen  = !S.collapsed[colKey];
    const avgPct  = grpAvg(syms);
    const avgCls  = cc(avgPct);
    const avgTxt  = avgPct!=null ? fPct(avgPct) : '';

    html += `
    <div class="wl-group" id="grp-${btoa(grpKey).replace(/[^a-z0-9]/gi,'_')}">
      <div class="grp-header ${isOpen?'open':''}" onclick="toggleGrp('${colKey}',this)">
        <span class="grp-arrow">▶</span>
        <span class="grp-name">${gName}</span>
        <div class="grp-meta">
          ${avgTxt ? `<span class="grp-avg ${avgCls}">${avgTxt}</span>` : ''}
          <span class="grp-count">${syms.length}</span>
        </div>
      </div>
      <div class="grp-body ${isOpen?'open':''}">
        ${syms.map(sym => {
          const d   = S.data[sym];
          const isSel = sym === sel;
          const dsym  = dispSym(sym, S.sector);
          const priceEl = d
            ? `<div class="t-price">${cs(d.currency)}${fp(d.price,d.currency)}</div>
               <div class="t-pct ${cc(d.changePct)}">${fPct(d.changePct)}</div>`
            : `<div class="t-ld">${S.fetching.has(sym)?'…':'—'}</div>`;
          return `
            <div class="t-item ${isSel?'selected':''}" data-sym="${sym}" data-grp="${grpKey}"
                 draggable="true"
                 ondragstart="onDragStart(event,'${sym}','${grpKey}')"
                 ondragover="onDragOver(event,'${sym}')"
                 ondrop="onDrop(event,'${sym}','${grpKey}')"
                 ondragend="onDragEnd()"
                 onclick="selectTicker('${sym}')">
              <span class="t-drag" title="Drag to reorder">⠿</span>
              <span class="t-sym">${dsym}</span>
              <span class="t-name">${d?.name||''}</span>
              <div class="t-right">${priceEl}</div>
              <button class="t-rm" onclick="removeTicker('${sym}',event)" title="Remove">×</button>
            </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  scroll.innerHTML = html;
}

function grpAvg(syms) {
  const vals = syms.map(s => S.data[s]?.changePct).filter(v => v!=null);
  if (!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}

function updateTickerEl(sym) {
  const el = document.querySelector(`.t-item[data-sym="${sym}"]`);
  if (!el) return;
  const d = S.data[sym];
  if (!d) return;
  const nameEl  = el.querySelector('.t-name');
  const rightEl = el.querySelector('.t-right');
  if (nameEl)  nameEl.textContent = d.name;
  if (rightEl) rightEl.innerHTML =
    `<div class="t-price">${cs(d.currency)}${fp(d.price,d.currency)}</div>
     <div class="t-pct ${cc(d.changePct)}">${fPct(d.changePct)}</div>`;
  // Refresh group averages
  const grp = el.closest('.wl-group');
  if (grp) {
    const symsInGrp = [...grp.querySelectorAll('.t-item')].map(t=>t.dataset.sym);
    const avg = grpAvg(symsInGrp);
    const avgEl = grp.querySelector('.grp-avg');
    if (avgEl && avg!=null) { avgEl.textContent=fPct(avg); avgEl.className='grp-avg '+cc(avg); }
  }
}

function toggleGrp(colKey, headerEl) {
  S.collapsed[colKey] = !S.collapsed[colKey];
  sv('fd2_col', S.collapsed);
  headerEl.classList.toggle('open', !S.collapsed[colKey]);
  const body = headerEl.nextElementSibling;
  if (body) body.classList.toggle('open', !S.collapsed[colKey]);
}

// ═══════════════════════════════════════════════════════════
// HEATMAP
// ═══════════════════════════════════════════════════════════
function heatColor(pct) {
  if (pct == null) return S.theme==='dark' ? '#1c2e40' : '#d8e5f0';
  const abs = Math.min(Math.abs(pct), 5);
  const t   = abs / 5;
  if (pct >= 0) {
    // green gradient
    const r = Math.round(0   + t * 0);
    const g = Math.round(80  + t * 120);
    const b = Math.round(60  + t * 0);
    return `rgb(${r},${g},${b})`;
  } else {
    const r = Math.round(120 + t * 135);
    const g = Math.round(30  + t * 0);
    const b = Math.round(30  + t * 0);
    return `rgb(${r},${g},${b})`;
  }
}

function renderHeatmap() {
  const groups  = getGroups(S.sector);
  const row     = document.getElementById('hmRow');
  const lbl     = document.getElementById('hmLabel');
  lbl.textContent = S.sector.toUpperCase()+' · '+(S.subGrp[S.sector]||'').toUpperCase()+' HEATMAP';
  row.innerHTML = Object.entries(groups).map(([name, syms]) => {
    const avg = grpAvg(syms);
    const bg  = heatColor(avg);
    const cls = cc(avg||0);
    const shortName = name.replace(' · Other','').replace(' ADRs','').replace('★ ','');
    return `<div class="hm-tile" style="background:${bg}" onclick="selectGroupFirstTicker('${name.replace(/'/g,"\\'")}')">
      <div class="hm-tile-name">${shortName}</div>
      <div class="hm-tile-pct">${avg!=null ? fPct(avg) : '—'}</div>
    </div>`;
  }).join('');
}

function selectGroupFirstTicker(name) {
  const groups = getGroups(S.sector);
  const syms   = groups[name];
  if (syms && syms[0]) selectTicker(syms[0]);
}

function refreshPreviewPrices(sym) {
  if (sym !== S.selected[S.sector]) return;
  const d = S.data[sym]; if (!d) return;
  const cur  = d.currency;
  const cls  = cc(d.changePct);
  const p    = document.getElementById('pv-price');
  const a    = document.getElementById('pv-abs');
  const pc   = document.getElementById('pv-pct');
  const prev = document.getElementById('pv-prev');
  if (p)    p.textContent  = cs(cur)+fp(d.price,cur);
  if (a)   { a.textContent = fAbs(d.change,cur); a.className='pv-abs '+cls; }
  if (pc)  { pc.textContent= fPct(d.changePct);  pc.className='pv-pct '+cls; }
  if (prev) prev.textContent = 'PREV CLOSE '+cs(cur)+fp(d.prev,cur);
}

async function renderPreview(sym) {
  const d = S.data[sym]; if (!d) { pvLoad(sym); loadAndRenderPreview(sym); return; }
  const sec  = S.sector;
  const cur  = d.currency;
  const dsym = dispSym(sym, sec);

  // 52W range
  let knobPct = 50, rangeNote = '';

    const pos = Math.max(0, Math.min(100, ((d.price - d.low52)/(d.high52 - d.low52))*100));
    knobPct   = pos.toFixed(1);
    const bH  = ((d.high52 - d.price)/d.high52*100).toFixed(1);
    const bL  = ((d.price  - d.low52)/d.low52 *100).toFixed(1);
    rangeNote = `${pos.toFixed(1)}% OF 52W RANGE · ${bH}% FROM HIGH · +${bL}% ABOVE LOW`;
  }

  // TV interval buttons
  const ivBtns = TV_IVS.map(iv =>
    `<button class="iv-btn ${iv===S.tvIv?'active':''}" onclick="setTvIv('${iv}')">${TV_LBLS[iv]}</button>`
  ).join('');

  document.getElementById('pvArea').innerHTML = `
    <div class="pv-body">

      <!-- HEADER -->
      <div class="pv-top">
        <div class="pv-left">
          <div class="pv-sym">${dsym}</div>
          <div class="pv-name">${d.name}</div>
          ${d.exchange ? `<div class="pv-exch">${d.exchange} · ${cur}</div>` : ''}
        </div>
        <div class="pv-right">
          <div class="pv-price" id="pv-price">${cs(cur)}${fp(d.price,cur)}</div>
          <div class="pv-chg-row">
            <span class="pv-abs ${cls}" id="pv-abs">${fAbs(d.change,cur)}</span>
            <span class="pv-pct ${cls}" id="pv-pct">${fPct(d.changePct)}</span>
          </div>
          <div class="pv-prev" id="pv-prev">PREV CLOSE ${cs(cur)}${fp(d.prev,cur)}</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- TIMEFRAMES -->
      <div class="sec-lbl">PERFORMANCE BY TIMEFRAME</div>
      <div class="tf-grid" id="tfGrid">
        ${['1H','4H','1D','1W','1M'].map(p=>`
        <div class="tf-card">
          <div class="tf-period">${p}</div>
          <div class="tf-val ld" id="tf-${p}">…</div>
        </div>`).join('')}
      </div>

      <div class="divider"></div>

      <!-- TRADINGVIEW CHART -->
      <div class="sec-lbl">LIVE CHART · TRADINGVIEW</div>
      <div class="tv-bar">
        <div class="tv-bar-left">
          <div class="iv-wrap" id="ivWrap">${ivBtns}</div>
          <div class="tv-acct-note"><div class="tv-acct-dot"></div>Session-linked · Stay logged into TradingView to load your templates &amp; save drawings</div>
        </div>
        <div class="tv-bar-right">
          <button class="fs-btn" onclick="openFullscreen('${sym}','${sec}')">
            ⛶ FULLSCREEN
          </button>
        </div>
      </div>
      <div class="tv-frame-wrap">
        <iframe id="tvFrame"
          src="${tvEmbedUrl(sym, sec, S.tvIv, S.theme)}"
          allowtransparency="true" frameborder="0" scrolling="no"
          allowfullscreen allow="fullscreen"></iframe>
      </div>

      <div class="divider"></div>

      <!-- METRICS -->
      <div class="sec-lbl">KEY METRICS</div>
      <div class="mt-grid">
        <div class="mc">
          <div class="mc-l">Volume</div>
          <div class="mc-v">${fv(d.volume)}</div>
          <div class="mc-s">Today's traded units</div>
        </div>
        <div class="mc">
          <div class="mc-l">52W High</div>
          <div class="mc-v pos">${cs(cur)}${fp(d.high52,cur)}</div>
          <div class="mc-s">${d.high52&&d.price ? ((d.price/d.high52-1)*100).toFixed(1)+'% from high' : '—'}</div>
        </div>
        <div class="mc">
          <div class="mc-l">52W Low</div>
          <div class="mc-v neg">${cs(cur)}${fp(d.low52,cur)}</div>
          <div class="mc-s">${d.low52&&d.price ? '+'+((d.price/d.low52-1)*100).toFixed(1)+'% above low' : '—'}</div>
        </div>
      </div>

      <!-- 52W RANGE BAR -->
      ${d.high52 && d.low52 ? `
      <div class="rng-sec">
        <div class="sec-lbl">52-WEEK PRICE RANGE</div>
        <div class="rng-row">
          <div class="rng-end">
            <div class="rng-ev neg">${cs(cur)}${fp(d.low52,cur)}</div>
            <div class="rng-el">52W LOW</div>

async function loadTimeframes(sym) {
  const d = S.data[sym]; if (!d) return;
  // Set 1D from what we already have
  setTfCell('1D', d.changePct);
  const tf = await fetchTimeframes(sym);
  if (S.selected[S.sector] !== sym) return; // user moved on
  S.tfData[sym] = tf;
  setTfCell('1H', tf.H1);
  setTfCell('4H', tf.H4);
  setTfCell('1D', tf.D1 ?? d.changePct);
  setTfCell('1W', tf.W1);
  setTfCell('1M', tf.M1);
}

function setTfCell(period, val) {
  const el = document.getElementById('tf-'+period);
  if (!el) return;
  if (val == null) { el.textContent = '—'; el.className = 'tf-val flat'; return; }
  el.textContent = fPct(val);
  el.className   = 'tf-val '+cc(val);
}

function setTvIv(iv) {
  S.tvIv = iv; sv('fd2_tvIv', iv);
  document.querySelectorAll('#ivWrap .iv-btn').forEach(b => b.classList.toggle('active', b.textContent===TV_LBLS[iv]));
  const frame = document.getElementById('tvFrame');
  const sym   = S.selected[S.sector];
  if (frame && sym) frame.src = tvEmbedUrl(sym, S.sector, iv, S.theme);
}

// FULLSCREEN CHART
// ═══════════════════════════════════════════════════════════
function openFullscreen(sym, sec) {
  const dsym = dispSym(sym, sec);
  const ivBtns = TV_IVS.map(iv =>
    `<button class="iv-btn ${iv===S.tvIv?'active':''}" onclick="fsSetIv('${iv}','${sym}','${sec}')">${TV_LBLS[iv]}</button>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'tv-fullscreen';
  overlay.id = 'tvFsOverlay';
  overlay.innerHTML = `
    <div class="tv-fs-bar">
      <span class="tv-fs-sym">${dsym}</span>
      <div class="tv-fs-ivs" id="fsIvWrap">${ivBtns}</div>
      <a href="${tvDeepLink(sym,sec)}" target="_blank" rel="noopener"
         style="font-family:var(--disp);font-size:10px;font-weight:700;color:var(--ac);text-decoration:none;letter-spacing:.08em;padding:3px 10px;border:1px solid var(--ac-b);border-radius:var(--r);background:var(--ac-d)">
        ↗ OPEN IN TRADINGVIEW
      </a>
      <button class="tv-fs-close" onclick="closeFullscreen()">✕ CLOSE FULLSCREEN</button>
    </div>
    <iframe id="tvFrameFull"
      src="${tvEmbedUrl(sym, sec, S.tvIv, S.theme)}"
      allowtransparency="true" frameborder="0"
      allowfullscreen allow="fullscreen"></iframe>`;
  document.body.appendChild(overlay);
  document.addEventListener('keydown', onFsKey);
}

function closeFullscreen() {
  const el = document.getElementById('tvFsOverlay');
  if (el) el.remove();
  document.removeEventListener('keydown', onFsKey);
}

function onFsKey(e) { if (e.key === 'Escape') closeFullscreen(); }

function fsSetIv(iv, sym, sec) {
  S.tvIv = iv; sv('fd2_tvIv', iv);
  const frame = document.getElementById('tvFrameFull');
  if (frame) frame.src = tvEmbedUrl(sym, sec, iv, S.theme);
  // Update buttons in both panels
  document.querySelectorAll('#fsIvWrap .iv-btn').forEach(b => b.classList.toggle('active', b.textContent===TV_LBLS[iv]));
  document.querySelectorAll('#ivWrap .iv-btn').forEach(b => b.classList.toggle('active', b.textContent===TV_LBLS[iv]));
}

// TOAST
// ═══════════════════════════════════════════════════════════
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast ${type} show`;
  clearTimeout(_tt);
  _tt = setTimeout(() => { el.className = 'toast'; }, 2800);
}
